        name: Setting some goals for 2023
        content: |-
          <p>It’s the most wonderful time of the year!</p>

          <p>It’s 1 January. The day I set myself some goals for the year ahead.</p>

          <p><a href="https://www.johnpe.art/2022/01/01/setting-goals-for-2022/">2022’s goals may not have gone according to plan</a>, but whilst I didn’t achieve my explicit goals, I did reach some big milestones.</p>

          <p>I’m a home owner now. I’m back in a job that I feel excited about. The stage is set for a good 2023 for me… at least, I hope so.</p>

          <p>Just like <a href="https://www.johnpe.art/goals/">the last 5 attempts</a>, my goals have to be specific, measurable and time-bound. I’m creating multiple goals so if one goes of course, I’m not tempted to throw in this endeavour entirely. The definition of success for any individual goal is completing at least 80% of the goal, and overall is 80% across the goals. My progress will be tracked in the open, to keep myself accountable<a href="https://www.johnpe.art/#fn:accountable">1</a>.</p>

          <h2>My goals for 2023</h2>

          <h3>1. Save some money</h3>

          <p>Last year I set myself the target of saving an average of £400 per month. Then I bought a maisonette in South London! Whilst I’m delighted to now be paying my own mortgage and not someone else’s, it did mean a mortal wound to my savings target.</p>

          <p>So, now I’ve spent my life savings <em>and then some</em>, I need to make some of that pot of gold back up again!</p>

          <p>My goal this year is therefore as it was last year: save £400 a month.</p>

          <blockquote>
            <p><strong>Success measure:</strong> £5,000 saved</p>
          </blockquote>

          <h3>2. Pay off my student loan</h3>

          <p>After almost a decade, I’ve reached the point where the Student Loans Company have told me to switch to direct debit to repay my student loans instead of taking it from payroll. This is great news!</p>

          <p>If the repayments go as scheduled, I’ll repay my student loan entirely by next summer. By interest rates are going up, and it’s costing me more to pay off the loan each month than I’d get from interest on the savings.</p>

          <p>My goal, therefore, is to accelerate my repayments so that by Christmas 2023, I no longer have to make the payments.</p>

          <p>If you’re thinking that sounds like it might inhibit my ability to complete my first goal: you’d be right! Which is why I’ll have to be incredibly disciplined to achieve it. Given I have no choice about making the minimum payments, I’m treating this as a stretch goal to my broader savings target.</p>

          <blockquote>
            <p><strong>Success measure:</strong> Student loan repaid in full</p>
          </blockquote>

          <h3>3. Write more</h3>

          <p>I’m hoping that a more calm 2023 is before me, which should give me time to return to writing a bit more. I’m hoping to achieve a goal I have reached in some previous years; writing an average of a blog post a month over the next year.</p>

          <blockquote>
            <p><strong>Success measure:</strong> write 12 blog posts</p>
          </blockquote>

          <h3>4. Close my activity rings</h3>

          <p>After a strong start to keeping fit in 2022, things fell by the wayside as the stress of moving into a new home set in. Despite that, I still managed to achieve my activity goals in 2022, and I want to get back to it properly in 2023.</p>

          <p>As defined by <a href="https://apple.com/uk/watch">Cupertino</a>, my aim is to ensure I:</p>

          <ul><li>stand for 1 minute every hour, at least 12 times a day</li>
            <li>do 30 minutes exercise a day</li>
            <li>burn 500 calories a day</li>
          </ul><p>My goal is to do each of those 3 things at least 5 times a week.</p>

          <blockquote>
            <p><strong>Success measure:</strong> close my activity rings at least 5 days a week all year</p>
          </blockquote>

          <h3>5. Weigh less</h3>

          <p>Autumnal stress eating and too much Christmas lebkuchen was not kind to my body in 2022. I spent a very, very diligent 2021 losing 10 kilograms, and I’ve regained 7 kilograms in the last 3 months.</p>

          <p>As I write this today, I weigh 77 kilograms. My goal is to weigh 70 kilograms by the summer, staying comfortably above my healthy minimum weight, but enabling me to get back into shape.</p>

          <blockquote>
            <p><strong>Success measure:</strong> 7 kilograms lost</p>
          </blockquote>

          <h2>Starting now</h2>

          <p>5 goals. 365 days. The challenge starts now!</p>

          <blockquote>
            <p>You can follow my progress with my goals by visiting my <a href="https://www.johnpe.art/goals/2023">goals dashboard</a>.</p>
          </blockquote>

            <ol><li>
                <p>Or put another way, so that <a href="https://www.johnpe.art/%E2%80%AAhttps://mastodon.social%E2%80%AC/@sparksofben">Ben-Jack</a> can nag me. <a href="https://www.johnpe.art/#fnref:accountable">↩</a></p>
              </li>
            </ol>
