# Site settings

title: John Peart
author: John Peart
description: "I’m John Peart. I’m a policy professional with an interest in technology, services and diversity.
I write about all sorts of things, and I build things in code."

baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.johnpe.art"

# Images and assets
image-path: "/assets/images"
css-path: "/assets/styles"
js-path: "/assets/scripts"

hero-images-path: "/assets/images/hero"
social-images-path: "/assets/images/social"
post-images-path: "/assets/images/posts"

social-media-image: "/assets/images/site/social-media.png"

theme-colour: "#009fe3"

favicon: "/favicon.ico"
favicon-svg: "/assets/images/site/favicon.svg"
favicon-pinned-svg: "/assets/images/site/favicon-pinned-svg.svg"
favicon-large-png: "/assets/images/site/favicon-large-png.png"


# Social settings
twitter-url: "https://twitter.com/johnpeart" # Twitter handle i.e. joebloggs
twitter-handle: "johnpeart" # Twitter handle i.e. joebloggs

mastodon-url: "https://mastodon.social/@johnpeart"
mastodon-handle: "johnpeart@mastodon.social"

github-url:  "https://github.com/johnpeart"
github-handle:  "johnpeart"

# Google settings
google-site-verification: "DaqGCZ6cZIqm7q_nVSnOzjJmFFjbRfW2X7FDzpQDQZk"

# Analytics
analytics: true

# Collections

collections:
  archive:
    output: true
    permalink: /archive/:path/
    defaults:
      values:
        layout: blog/post
        
# Site header

header: true

# Plugins and build settings

permalink: pretty
markdown: kramdown
future: false
highlighter: rouge

plugins:
- jekyll-sitemap
- jekyll-feed
- jekyll-redirect-from

remote_theme: johnpeart/jekyll-theme

